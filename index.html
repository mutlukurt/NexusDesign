<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Design | Premium Digital Design & Industrial Engineering Agency</title>
    <meta name="description" content="Nexus Design is a leading premium design and engineering agency, crafting future-proof digital experiences, autonomous vehicles, energy storage systems, and high-end brand narratives." />
    <link rel="canonical" href="https://nexusdesign.co/" />
    <!-- Preload Critical Above-the-Fold LCP Asset -->
    <link rel="preload" href="/assets/hero_sculpture.webp" as="image" type="image/webp" fetchpriority="high">

    <!-- Google Fonts (Async Loading) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
    </noscript>

    <!-- CSS Override to Hide Default Cursor on Desktop -->
    <style>
      @media (min-width: 1024px) {
        body, a, button, input, select, textarea, [role="button"], [style*="cursor: pointer"] {
          cursor: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
